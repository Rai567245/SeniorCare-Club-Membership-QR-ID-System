<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SeniorCare — Membership Verification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --accent:      #f0a500;
      --accent-light:#ffe08a;
      --accent-glow: rgba(240,165,0,0.14);
      --green:       #00c97a;
      --green-bg:    rgba(0,201,122,0.10);
      --red:         #e8334a;
      --red-bg:      rgba(232,51,74,0.10);
      --yellow:      #f5a623;
      --yellow-bg:   rgba(245,166,35,0.10);
      --text:        #1a1f2e;
      --text-muted:  #5a6a82;
      --text-faint:  #9aaabb;
      --border:      #e4eaf2;
      --surface:     #f7f9fc;
      --font-display:'Syne', sans-serif;
      --font-body:   'DM Sans', sans-serif;
      --radius:      16px;
      --radius-sm:   10px;
      --shadow:      0 8px 48px rgba(26,31,46,0.10), 0 2px 8px rgba(26,31,46,0.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: #fff;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    /* ── Page wrapper ── */
    .page-wrap {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── Logo ── */
    .logo-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .logo-img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      filter: drop-shadow(0 4px 18px rgba(240,165,0,0.18));
    }
    .org-name {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--text);
      text-align: center;
      line-height: 1.25;
    }
    .org-name span { color: var(--accent); }
    .org-sub {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    /* ── Status badge ── */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .status-badge.valid   { background: var(--green-bg);  color: var(--green);  border: 1.5px solid rgba(0,201,122,0.3); }
    .status-badge.expired { background: var(--red-bg);    color: var(--red);    border: 1.5px solid rgba(232,51,74,0.3); }
    .status-badge.soon    { background: var(--yellow-bg); color: var(--yellow); border: 1.5px solid rgba(245,166,35,0.3); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-badge.valid   .status-dot { background: var(--green); }
    .status-badge.expired .status-dot { background: var(--red); }
    .status-badge.soon    .status-dot { background: var(--yellow); }

    /* ── Membership card ── */
    .member-card {
      width: 100%;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-header {
      background: #1a2d44;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-header-icon {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-header-icon svg { display: block; }
    .card-header-text { flex: 1; }
    .card-header-title {
      font-family: var(--font-display);
      font-size: 0.88rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .card-header-sub {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.06em;
    }

    .card-body { padding: 0; }
    .field-row-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .field-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .field-item:nth-child(even) { border-right: none; }
    .field-item.full { grid-column: 1 / -1; border-right: none; }
    .field-item:last-child, .field-item:nth-last-child(2):not(.full) { border-bottom: none; }

    .field-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 5px;
    }
    .field-value {
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
      line-height: 1.35;
    }
    .field-value.name-value {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 800;
      color: #1a2d44;
    }
    .field-value.id-value {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    /* ── Verification footer ── */
    .verify-footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-faint);
      letter-spacing: 0.04em;
      line-height: 1.7;
    }
    .verify-footer strong { color: var(--text-muted); }

    /* ── Error state ── */
    .error-state {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .error-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--red-bg);
      border: 2px solid rgba(232,51,74,0.2);
      display: flex; align-items: center; justify-content: center;
      color: var(--red);
      font-size: 1.8rem;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text);
    }
    .error-desc { font-size: 0.88rem; color: var(--text-muted); max-width: 320px; line-height: 1.6; }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      .field-row-pair { grid-template-columns: 1fr; }
      .field-item { border-right: none; }
      .field-item.full { grid-column: unset; }
      .field-item:last-child { border-bottom: none; }
      .field-item:nth-last-child(2):not(.full) { border-bottom: 1px solid var(--border); }
      .logo-img { width: 88px; height: 88px; }
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }
    }
    .page-wrap > * {
      animation: fadeUp 0.45s cubic-bezier(0.2,0.8,0.3,1) both;
    }
    .page-wrap > *:nth-child(1) { animation-delay: 0.0s; }
    .page-wrap > *:nth-child(2) { animation-delay: 0.07s; }
    .page-wrap > *:nth-child(3) { animation-delay: 0.13s; }
    .page-wrap > *:nth-child(4) { animation-delay: 0.18s; }
    .page-wrap > *:nth-child(5) { animation-delay: 0.23s; }
    .page-wrap > *:nth-child(6) { animation-delay: 0.28s; }
  </style>
</head>
<body>

<div class="page-wrap" id="pageWrap">
  <!-- Content injected by JS -->
</div>

<script>
  // ── Utility: decode base64url-encoded JSON from ?data= param ──
  function getDataParam() {
    var search = window.location.search;
    var match  = search.match(/[?&]data=([^&]*)/);
    if (!match) return null;
    try {
      // atob requires standard base64; replace url-safe chars back
      var b64 = match[1].replace(/-/g, '+').replace(/_/g, '/');
      var decoded = decodeURIComponent(escape(atob(b64)));
      return JSON.parse(decoded);
    } catch(e) {
      return null;
    }
  }

  function esc(text) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(String(text || '')));
    return d.innerHTML;
  }

  function fmtDate(dateStr) {
    if (!dateStr) return 'N/A';
    var parts = dateStr.split('-');
    if (parts.length < 3) return dateStr;
    var d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function getMemberStatus(expiryDateStr) {
    if (!expiryDateStr) return { cls: 'valid', text: 'Active Member' };
    var today = new Date(); today.setHours(0,0,0,0);
    var parts = expiryDateStr.split('-');
    var expiry = new Date(+parts[0], +parts[1]-1, +parts[2]);
    var daysLeft = Math.ceil((expiry - today) / 86400000);
    if (daysLeft < 0) {
      return { cls: 'expired', text: 'Membership Expired' };
    } else if (daysLeft <= 30) {
      return { cls: 'soon', text: 'Expiring in ' + daysLeft + ' day' + (daysLeft !== 1 ? 's' : '') };
    } else {
      return { cls: 'valid', text: 'Active Member · ' + daysLeft + ' days left' };
    }
  }

  function renderMember(data) {
    var status = getMemberStatus(data.expiryDate);
    var wrap = document.getElementById('pageWrap');
    wrap.innerHTML =
      // Logo block
      '<div class="logo-block">' +
        '<img class="logo-img" src="' + LOGO_B64 + '" alt="Federation Golf Logo"/>' +
        '<div class="org-name">Federation <span>Golf</span></div>' +
        '<div class="org-sub">Senior Care Club Membership</div>' +
      '</div>' +

      '<div class="divider"></div>' +

      // Status badge
      '<div class="status-badge ' + status.cls + '">' +
        '<div class="status-dot"></div>' +
        esc(status.text) +
      '</div>' +

      // Membership card
      '<div class="member-card">' +
        '<div class="card-header">' +
          '<div class="card-header-icon">' +
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8a2 2 0 0 0-2 2v2h12V5a2 2 0 0 0-2-2z"/></svg>' +
          '</div>' +
          '<div class="card-header-text">' +
            '<div class="card-header-title">Membership ID Card</div>' +
            '<div class="card-header-sub">Senior Care QR Verification</div>' +
          '</div>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="field-row-pair">' +
            '<div class="field-item full">' +
              '<div class="field-label">Name of Member</div>' +
              '<div class="field-value name-value">' + esc(data.name) + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="field-row-pair">' +
            '<div class="field-item">' +
              '<div class="field-label">Senior Care I.D. No.</div>' +
              '<div class="field-value id-value">' + esc(data.id) + '</div>' +
            '</div>' +
            '<div class="field-item">' +
              '<div class="field-label">Club Membership</div>' +
              '<div class="field-value">' + esc(data.club) + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="field-row-pair">' +
            '<div class="field-item">' +
              '<div class="field-label">Membership Date</div>' +
              '<div class="field-value">' + esc(fmtDate(data.membershipDate)) + '</div>' +
            '</div>' +
            '<div class="field-item">' +
              '<div class="field-label">Expiry Date</div>' +
              '<div class="field-value">' + esc(fmtDate(data.expiryDate)) + '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +

      // Footer
      '<div class="verify-footer">' +
        '<strong>SeniorCare QR Membership System</strong><br>' +
        'This page was opened via a verified membership QR code.<br>' +
        '&copy; 2026 Federation Golf Club' +
      '</div>';
  }

  function renderError() {
    var wrap = document.getElementById('pageWrap');
    wrap.innerHTML =
      '<div class="logo-block">' +
        '<img class="logo-img" src="' + LOGO_B64 + '" alt="Federation Golf Logo"/>' +
        '<div class="org-name">Federation <span>Golf</span></div>' +
        '<div class="org-sub">Senior Care Club Membership</div>' +
      '</div>' +
      '<div class="divider"></div>' +
      '<div class="error-state">' +
        '<div class="error-icon">&#9888;</div>' +
        '<div class="error-title">Invalid QR Code</div>' +
        '<div class="error-desc">This QR code does not contain valid SeniorCare membership data. Please scan a valid membership QR code generated by the system.</div>' +
      '</div>';
  }

  // ── Main ──
  var data = getDataParam();
  if (data && data.name) {
    renderMember(data);
  } else {
    renderError();
  }
</script>
